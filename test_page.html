<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline Test Interface</title>
    <style>
        :root {
            --bg-color: #0f111a;
            --surface-color: #1a1d2d;
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --log-bg: #0b0c10;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 0.875rem 1rem;
            background-color: var(--log-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        button {
            flex: 1;
            padding: 0.875rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        button.secondary {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        button.secondary:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .console {
            background-color: var(--log-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.25rem;
            height: 250px;
            overflow-y: auto;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.875rem;
            color: #d1d5db;
        }

        .log-entry {
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-entry.error { color: #ef4444; }
        .log-entry.success { color: #10b981; }
        .log-entry.info { color: #60a5fa; }
    </style>
</head>
<body>

<div class="container">
    <h1>Pipeline Testing Interface</h1>
    <p class="subtitle">Mock direct requests to local LLM and TTS microservices</p>

    <div class="form-group">
        <label for="promptInput">Test Input Text</label>
        <textarea id="promptInput" rows="3" placeholder="Enter text to transmit..."></textarea>
    </div>

    <div class="button-group">
        <button id="btnLlm">Test LLM Connection</button>
        <button id="btnTts" class="secondary">Test TTS Connection</button>
    </div>

    <div class="form-group">
        <label>System Output</label>
        <div id="consoleDiv" class="console">
            <div class="log-entry info">System ready. Awaiting commands.</div>
        </div>
    </div>
</div>

<script>
    const logOutput = document.getElementById('consoleDiv');
    const promptInput = document.getElementById('promptInput');

    function log(message, type = 'info') {
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        logOutput.appendChild(entry);
        logOutput.scrollTop = logOutput.scrollHeight;
    }

    document.getElementById('btnLlm').addEventListener('click', async () => {
        const text = promptInput.value.trim();
        if (!text) {
            log("Please enter text before testing LLM.", "error");
            return;
        }

        log(`Sending request to LLM (localhost:8080)...`, "info");
        
        try {
            const response = await fetch("http://localhost:8080/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: [{ role: "user", content: text }],
                    stream: false,
                    max_tokens: 100
                })
            });

            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const data = await response.json();
            const output = data.choices[0].message.content;
            log(`LLM Response: ${output}`, "success");

        } catch (error) {
            log(`LLM Connection failed. Are you running the backend? (${error.message})`, "error");
        }
    });

    document.getElementById('btnTts').addEventListener('click', async () => {
         const text = promptInput.value.trim();
        if (!text) {
            log("Please enter text before testing TTS.", "error");
            return;
        }

        log(`Sending request to TTS (localhost:8000)...`, "info");

        try {
            const response = await fetch("http://localhost:8000/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: text })
            });

            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            log(`TTS Audio generated successfully. Retreived bytes.`, "success");
            
            // Generate a blob and play it to prove connection
            const blob = await response.blob();
            const audioUrl = URL.createObjectURL(blob);
            const audio = new Audio(audioUrl);
            audio.play();

        } catch (error) {
            log(`TTS Connection failed. Are you running the backend? (${error.message})`, "error");
        }
    });
</script>

</body>
</html>
